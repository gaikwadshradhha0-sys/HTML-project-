<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Card</title>
</head>
<body style="background-color: #f5f5f5; font-family: Arial;">

    <div style="width: 300px; margin: 100px auto; padding: 20px; 
                background-color: white; border-radius: 10px; 
                box-shadow: 0px 0px 10px gray; text-align: center;">

        <h2 style="color: #333;">Profile Card</h2>

        <img src="https://via.placeholder.com/100" 
             style="border-radius: 50%; margin-bottom: 10px;">

        <p style="color: #666; font-size: 16px;">
            Hello! This is a simple card using inline CSS.
        </p>

        <button style="background-color: green; color: white; 
                       padding: 10px 15px; border: none; 
                       border-radius: 5px; cursor: pointer;">
            Follow
        </button>

    </div>

</body>
</html>
