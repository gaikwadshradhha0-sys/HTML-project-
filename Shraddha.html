<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Example</title>
</head>
<body style="background-color: lightblue; text-align: center; font-family: Arial;">

    <h1 style="color: darkblue;">Welcome to My Website</h1>

    <p style="color: black; font-size: 18px;">
        This is an example of inline CSS in HTML.
    </p>

    <button 
        style="background-color: blue; color: white; padding: 10px; border: none; border-radius: 5px;"
        onclick="alert('Button Clicked!')">
        Click Me
    </button>

</body>
</html>
